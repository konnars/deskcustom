name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Install npm dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Generate Windows-compatible icons
        working-directory: apps/desktop
        run: npm run icons

      - name: Build NSIS installer
        working-directory: apps/desktop
        run: npm run tauri build -- --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          $version = (Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "NSIS installer not found in bundle/nsis/"
          }

          $outName = "Deskcustom_${version}_x64-setup.exe"
          Copy-Item $installer.FullName "dist/$outName"
          Write-Host "Installer: dist/$outName"

          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $downloadUrl = if ($tag -match '^v') {
            "https://github.com/$repo/releases/download/$tag/$outName"
          } else {
            "https://github.com/$repo/actions/runs/${{ github.run_id }}"
          }

          $manifest = @{
            version = $version
            notes   = "Build ${{ github.sha }}"
            platforms = @{
              "windows-x86_64" = @{
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 4

          Set-Content -Path dist/latest.json -Value $manifest -Encoding UTF8
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskcustom-windows-${{ github.ref_name }}
          path: dist/
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
